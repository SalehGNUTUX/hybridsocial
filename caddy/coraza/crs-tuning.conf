# OWASP CRS v4 tuning for HybridSocial.
#
# This file is loaded AFTER crs-setup.conf and BEFORE rules/*.conf, so
# any tx.* variables set here override the CRS defaults. Rule
# exclusion IDs in the 10100–10999 range are reserved for HybridSocial-
# specific false-positive carve-outs.
#
# Whenever federation traffic gets blocked in production, capture the
# rule_id from /var/log/caddy/coraza-audit.log, add a SecRuleRemoveById
# (or SecRuleUpdateTargetById) entry below with a comment explaining
# *why*, and re-run scripts/waf-federation-probe.sh to verify the
# probe still passes.

# ----- Allowed HTTP methods -----
# Need at minimum: GET/HEAD (reads), POST (create + AP inbox), PUT
# (edit), DELETE (delete), PATCH (partial update), OPTIONS (CORS
# preflight).
SecAction \
  "id:900200,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:'tx.allowed_methods=GET HEAD POST PUT DELETE PATCH OPTIONS'"

# ----- Allowed request content types -----
# Standard browser/API set + ActivityPub federation MIME types
# (application/activity+json, application/ld+json) which CRS does
# NOT include by default. Without this, every signed inbox delivery
# from another instance gets blocked by rule 920420.
SecAction \
  "id:900220,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| \
|multipart/form-data| \
|multipart/related| \
|application/json| \
|application/ld+json| \
|application/activity+json| \
|application/jrd+json| \
|application/xml| \
|application/cloudevents+json| \
|text/xml| \
|text/plain|'"

# ----- File upload size limits (server-side hard cap) -----
# These mirror the Coraza body-size config so CRS doesn't fight it.
# We accept up to one 100MB file per request (single video).
SecAction \
  "id:900280,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:'tx.combined_file_sizes=104857600',\
   setvar:'tx.max_file_size=104857600'"

# ----- Paranoia level -----
# CRS PL2 = balanced for a public-facing site. PL1 lets too much pass;
# PL3+ blocks legitimate user content (markdown, code snippets in posts).
SecAction \
  "id:900000,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.blocking_paranoia_level=2,\
   setvar:tx.detection_paranoia_level=2"

# ----- HybridSocial-specific exclusions (10100–10999 reserved) -----

# 10100: ActivityPub inbox endpoints accept signed POSTs from arbitrary
# remote instances. Their bodies legitimately contain the full text of
# user posts, which can include strings that look like SQLi/XSS
# payloads to CRS. We disable strict body inspection on inbox paths
# only — they're authenticated by HTTP Signature and parsed by the
# AP layer, which validates structure.
SecRule REQUEST_URI "@beginsWith /inbox" \
  "id:10100,\
   phase:1,\
   pass,\
   nolog,\
   ctl:ruleRemoveTargetByTag=attack-sqli;ARGS,\
   ctl:ruleRemoveTargetByTag=attack-xss;ARGS,\
   ctl:ruleRemoveTargetByTag=attack-rce;ARGS"

SecRule REQUEST_URI "@rx ^/users/[^/]+/inbox" \
  "id:10101,\
   phase:1,\
   pass,\
   nolog,\
   ctl:ruleRemoveTargetByTag=attack-sqli;ARGS,\
   ctl:ruleRemoveTargetByTag=attack-xss;ARGS,\
   ctl:ruleRemoveTargetByTag=attack-rce;ARGS"

# 10110: HTTP Signature headers (Signature, Digest) are unusual and
# trigger 920XXX header-validation rules. Whitelist them on AP paths.
SecRule REQUEST_URI "@rx ^/(inbox|users/[^/]+/(inbox|outbox|followers|following))" \
  "id:10110,\
   phase:1,\
   pass,\
   nolog,\
   ctl:ruleRemoveById=920470,\
   ctl:ruleRemoveById=920480"

# 10120: WebFinger lookups (.well-known/webfinger) take a `resource=`
# query parameter that contains an `acct:` URI. The colon and `@`
# trigger 932XXX command-injection rules. WebFinger is read-only
# discovery; safe to relax.
SecRule REQUEST_URI "@beginsWith /.well-known/webfinger" \
  "id:10120,\
   phase:1,\
   pass,\
   nolog,\
   ctl:ruleRemoveTargetByTag=attack-rce;ARGS"

# 10130: NodeInfo + ActivityPub actor JSON returns fields with URLs
# and HTML-escaped bio content. Response body scanning false-positives
# on Mastodon-style emoji shortcodes and bio markup. Skip response
# body inspection for these read-only public endpoints.
SecRule REQUEST_URI "@rx ^/(nodeinfo|users/[^/]+|actors/[^/]+|activities/)" \
  "id:10130,\
   phase:1,\
   pass,\
   nolog,\
   ctl:responseBodyAccess=Off"

# 920451: the extended restricted-header check (paranoia level 2) flags
# the deprecated Accept-Charset header, which legit crawlers (e.g.
# DotBot) still send on /robots.txt — tripping the +5 anomaly score and
# blocking the fetch. Remove ONLY 920451; rule 920450 stays and keeps
# guarding the security-relevant restricted headers (Proxy, Lock-Token,
# Content-Range, If).
SecRuleRemoveById 920451
