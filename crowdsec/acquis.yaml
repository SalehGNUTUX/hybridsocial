# Log sources CrowdSec ingests. The `caddy` collection parses the
# Caddy JSON access logs; we pull both the main site log and the
# media-domain log so brute-force scans against either are noticed.
filenames:
  - /var/log/caddy/access.log
  - /var/log/caddy/media-access.log
labels:
  type: caddy
---
# Host SSH auth log (bind-mounted from /var/log/secure) so the sshd
# scenarios in the crowdsecurity/linux collection detect brute-force
# against the box and feed the firewall bouncer.
filenames:
  - /var/log/host-secure
labels:
  type: syslog
